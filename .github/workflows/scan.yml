name: Market Anomaly Scanner

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Secrets (configured in repo Settings → Secrets)
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # Variables (configured in repo Settings → Variables)
      Z_SCORE_THRESHOLD: ${{ vars.Z_SCORE_THRESHOLD || '2.0' }}
      FUNDING_THRESHOLD_ANNUALIZED: ${{ vars.FUNDING_THRESHOLD_ANNUALIZED || '100' }}
      LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '168' }}
      MIN_VOLUME_USD: ${{ vars.MIN_VOLUME_USD || '1000' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.1-flash-lite' }}
      GEMINI_MAX_RPM: ${{ vars.GEMINI_MAX_RPM || '10' }}
      MAX_CANDLE_FETCHES: ${{ vars.MAX_CANDLE_FETCHES || '50' }}
      CANDLE_FETCH_DELAY: ${{ vars.CANDLE_FETCH_DELAY || '0.15' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scanner
        run: python -m scanner.main
